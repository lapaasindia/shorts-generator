name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install web dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-web.txt
      - name: Compile Python
        run: |
          python -m py_compile main.py web_app.py wsgi.py shorts_generator/*.py shorts_generator/local/*.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ai-shorts-generator:test .
