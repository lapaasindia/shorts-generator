services:
  shorts-web:
    build: .
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      DATA_DIR: /data
      TRANSCRIBER_PROVIDER: sarvam
      LLM_PROVIDER: heuristic
      COOKIE_SECURE: "false"
    volumes:
      - shorts_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  shorts_data:
