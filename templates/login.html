<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Team Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v='quickdark1') }}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#07080a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shorts">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
  </head>
  <body>
    <main class="login-shell">
      <section class="login-panel">
        <p class="kicker">AI YouTube Shorts Generator</p>
        <h1>Team Login</h1>
        <form method="post" class="login-form">
          <div class="field">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" value="team" autocomplete="username" required>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required autofocus>
          </div>
          {% if error %}
            <p class="form-error">{{ error }}</p>
          {% endif %}
          <button class="run-button" type="submit">
            <span class="run-icon" aria-hidden="true"></span>
            Sign In
          </button>
        </form>
      </section>
    </main>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('[Service Worker] Registered successfully from Login with scope:', reg.scope))
            .catch((err) => console.error('[Service Worker] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
